version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: nginx_laravel
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./sites:/etc/nginx/conf.d:ro
      - ./logs:/var/log/nginx
      - ../php_project:/var/www/html:ro
    depends_on:
      - php74
      - php82
    restart: unless-stopped
    networks:
      - php-network

  php74:
    image: php:7.4-fpm-alpine
    container_name: php74_fpm
    volumes:
      - ../php_project:/var/www/html
    working_dir: /var/www/html
    restart: unless-stopped
    networks:
      - php-network
    command: >
      sh -c "docker-php-ext-install pdo_mysql
      && php-fpm"

  php82:
    image: php:8.2-fpm-alpine
    container_name: php82_fpm
    volumes:
      - ../php_project:/var/www/html
    working_dir: /var/www/html
    restart: unless-stopped
    networks:
      - php-network
    command: >
      sh -c "docker-php-ext-install pdo_mysql
      && php-fpm"

networks:
  php-network:
    driver: bridge

