version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: nginx_laravel
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./sites:/etc/nginx/conf.d:ro
      - ./logs:/var/log/nginx
      - ../php_project:/var/www/html:ro
    depends_on:
      - php74
      - php82
      - php84
    restart: unless-stopped
    networks:
      - php-network

  php74:
    build: ./php74  # ชี้ไปที่ folder ที่มี Dockerfile
    container_name: php74_fpm
    volumes:
      - ../php_project:/var/www/html
    working_dir: /var/www/html
    restart: unless-stopped
    networks:
      - php-network

  php82:
    build: ./php82
    container_name: php82_fpm
    volumes:
      - ../php_project:/var/www/html
    working_dir: /var/www/html
    restart: unless-stopped
    networks:
      - php-network

  php84:
    build: ./php84
    container_name: php84_fpm
    volumes:
      - ../php_project:/var/www/html
    working_dir: /var/www/html
    restart: unless-stopped
    networks:
      - php-network

networks:
  php-network:
    driver: bridge